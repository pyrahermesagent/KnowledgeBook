name: Build, publish and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Check deploy secrets
        id: check
        run: echo "configured=${{ secrets.SSH_HOST != '' }}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Hetzner via SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR || '/opt/knowledgebook' }}
          DEPLOY_BRANCH: main
          REPO_URL: https://github.com/${{ github.repository }}.git
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_PUBLIC_URL: ${{ secrets.S3_PUBLIC_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          envs: DEPLOY_DIR,DEPLOY_BRANCH,REPO_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,SESSION_PASSWORD,S3_ENDPOINT,S3_REGION,S3_BUCKET,S3_ACCESS_KEY,S3_SECRET_KEY,S3_PUBLIC_URL
          script: |
            set -e
            if [ -z "$GOOGLE_CLIENT_ID" ] || [ -z "$GOOGLE_CLIENT_SECRET" ] || [ -z "$SESSION_PASSWORD" ]; then
              echo "Missing GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET / SESSION_PASSWORD secrets."
              exit 1
            fi
            mkdir -p "$DEPLOY_DIR"
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone --branch "$DEPLOY_BRANCH" "$REPO_URL" "$DEPLOY_DIR"
            fi
            cd "$DEPLOY_DIR"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout -f "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            git clean -fd
            printf '%s\n' \
              "NUXT_OAUTH_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" \
              "NUXT_OAUTH_GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" \
              "NUXT_SESSION_PASSWORD=$SESSION_PASSWORD" \
              "NUXT_S3_ENDPOINT=$S3_ENDPOINT" \
              "NUXT_S3_REGION=$S3_REGION" \
              "NUXT_S3_BUCKET=$S3_BUCKET" \
              "NUXT_S3_ACCESS_KEY=$S3_ACCESS_KEY" \
              "NUXT_S3_SECRET_KEY=$S3_SECRET_KEY" \
              "NUXT_S3_PUBLIC_URL=$S3_PUBLIC_URL" \
              > .env
            chmod 600 .env
            docker compose build --pull
            # No `down -v` and no .data cleanup here on purpose: the
            # knowledgebook-data volume holds the SQLite database and local
            # uploads and must survive deployments.
            docker compose up -d --remove-orphans
            docker image prune -f
