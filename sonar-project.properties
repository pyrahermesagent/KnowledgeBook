# SonarQube Configuration for KnowledgeBook

sonar.projectKey=pyrahermesagent_knowledgebook
sonar.organization=pyrahermesagent

# This is the name and version displayed in the SonarQube UI
sonar.projectName=KnowledgeBook
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/.nuxt/**,**/.output/**,**/dist/**,**/coverage/**,**/*.test.*,**/*.spec.*

# Code coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=js

# Test
sonar.tests=.
sonar.test.inclusions=**/*.test.*,**/*.spec.*

# Coverage
sonar.coverage.exclusions=**/*.config.*,**/nuxt.config.*,**/commitlint.config.*,**/.github/**/*,**/coverage/**/*

# Keycloak
sonar.auth.keycloak.enabled=false
